<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семейное древо Напримеров / Naprimerov Family Tree</title>
    <style>
        /* Морской стиль (Морская палитра: глубокий синий, золото, белый и стальной) */
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f0f4f8; /* Цвет легкого морского бриза */
            color: #1d2d44;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #0b2545; /* Глубокий океанский синий */
            color: #ffffff;
            padding: 40px 20px;
            border-bottom: 5px solid #c5a059; /* Золотой капитанский кант */
            box-shadow: 0 4px 12px rgba(11, 37, 69, 0.2);
        }
        header h1 {
            margin: 0 0 20px 0;
            font-size: 2.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }
        .btn {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 10px 24px;
            margin: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #ffffff;
            color: #0b2545;
        }
        .btn-contact {
            background-color: #c5a059; /* Золотая кнопка связи */
            color: #0b2545;
            border-color: #c5a059;
        }
        .btn-contact:hover {
            background-color: #134074;
            color: #ffffff;
            border-color: #134074;
        }
        .tree-container {
            display: flex;
            flex-direction: column;
            gap: 35px;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .tree-level {
            background: #ffffff;
            border: 1px solid #d0dbe5;
            border-left: 6px solid #0b2545; /* Синий корабельный борт */
            border-radius: 4px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
        }
        .level-title {
            font-weight: 700;
            color: #134074;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 8px;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            text-align: left;
        }
        .nodes-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 20px;
        }
        .tree-node {
            background-color: #ffffff;
            border: 2px solid #134074; /* Напоминает оформление кают-компании */
            border-radius: 4px;
            padding: 15px 20px;
            min-width: 240px;
            text-align: left;
            box-shadow: 2px 2px 8px rgba(19, 64, 116, 0.05);
            position: relative;
        }
        .tree-node::before {
            content: "⚓"; /* Маленький аккуратный якорь на каждой карточке */
            position: absolute;
            right: 15px;
            top: 15px;
            color: #cbd5e1;
            font-size: 14px;
        }
        .tree-node h4 {
            margin: 0 0 8px 0;
            color: #0b2545;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
            padding-right: 20px;
        }
        .tree-node p {
            margin: 0;
            color: #c5a059; /* Золотистый цвет для дат */
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1 id="site-title">Семейное древо НАПРИМЕРОВ</h1>
    <button class="btn" id="lang-toggle" onclick="toggleLanguage()">English</button>
    <a class="btn btn-contact" id="contact-btn" href="mailto:naprimerov@mail.ru?subject=Заявка в древо / Tree Application&body=ФИО / Full Name:%0AГоды жизни / Years of life:%0AРодство / Relationship:">Написать мне / Contact Me</a>
</header>

<main class="tree-container">
    <!-- Поколение 1: Дедушки -->
    <div class="tree-level">
        <div class="level-title" id="title-gparents">Поколение: Дедушки и Бабушки</div>
        <div class="nodes-group" id="level-grandparents"></div>
    </div>

    <!-- Поколение 2: Родители -->
    <div class="tree-level">
        <div class="level-title" id="title-parents">Поколение: Родители</div>
        <div class="nodes-group" id="level-parents"></div>
    </div>

    <!-- Поколение 3: Мы -->
    <div class="tree-level">
        <div class="level-title" id="title-current">Поколение: Текущее</div>
        <div class="nodes-group" id="level-current"></div>
    </div>
</main>

<script>
    // ==========================================
    // БАЗА ДАННЫХ ДРЕВА (ОБНОВЛЕННАЯ)
    // ==========================================
    const familyData = [
        {
            nameRu: "Напримеров Дмитрий Викторович",
            nameEn: "Naprimerov Dmitriy Viktorovich",
            years: "27.09.1980", 
            level: "current"
        },
        {
            nameRu: "Напримеров Пётр Филиппович",
            nameEn: "Naprimerov Petr Filippovich",
            years: "1915 - 1992", 
            level: "grandparents"
        },
        {
            nameRu: "Напримеров Виктор Петрович",
            nameEn: "Naprimerov Viktor Petrovich",
            years: "1947 - н.в.",
            level: "parents"
        }
    ];

    // Перевод интерфейса
    const translations = {
        ru: {
            title: "Семейное древо НАПРИМЕРОВ",
            gparents: "Поколение: Дедушки и Бабушки",
            parents: "Поколение: Родители",
            current: "Поколение: Текущее",
            contact: "Связаться со мной",
            toggle: "English"
        },
        en: {
            title: "NAPRIMEROV Family Tree",
            gparents: "Generation: Grandparents",
            parents: "Generation: Parents",
            current: "Generation: Current",
            contact: "Contact Me",
            toggle: "Русский"
        }
    };

    let currentLang = 'ru';

    function renderTree() {
        document.getElementById('level-grandparents').innerHTML = '';
        document.getElementById('level-parents').innerHTML = '';
        document.getElementById('level-current').innerHTML = '';

        document.getElementById('site-title').innerText = translations[currentLang].title;
        document.getElementById('title-gparents').innerText = translations[currentLang].gparents;
        document.getElementById('title-parents').innerText = translations[currentLang].parents;
        document.getElementById('title-current').innerText = translations[currentLang].current;
        document.getElementById('contact-btn').innerText = translations[currentLang].contact;
        document.getElementById('lang-toggle').innerText = translations[currentLang].toggle;

        familyData.forEach(person => {
            const container = document.getElementById(`level-${person.level}`);
            if (container) {
                const name = currentLang === 'ru' ? person.nameRu : person.nameEn;
                const node = document.createElement('div');
                node.className = 'tree-node';
                node.innerHTML = `<h4>${name}</h4><p>${person.years}</p>`;
                container.appendChild(node);
            }
        });
    }

    function toggleLanguage() {
        currentLang = currentLang === 'ru' ? 'en' : 'ru';
        renderTree();
    }

    renderTree();
</script>

</body>
</html>
