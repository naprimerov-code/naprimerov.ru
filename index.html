<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Родословная рода Напримеровых</title>
    <style>
        /* (Ваши стили остаются прежними, они были верными) */
        body { font-family: "Georgia", serif; background-color: #f7f5f0; color: #2b2d2f; margin: 0; padding: 0; text-align: center; line-height: 1.6; }
        header { background-color: #1e252b; color: #f7f5f0; padding: 60px 20px; border-bottom: 3px solid #b89047; }
        .menu-container { position: absolute; top: 20px; right: 20px; }
        .menu-btn { background: none; border: none; color: #b89047; font-size: 32px; cursor: pointer; }
        .menu-dropdown { display: none; position: absolute; right: 0; top: 45px; background-color: #ffffff; min-width: 280px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); z-index: 1010; }
        .menu-dropdown button { display: block; width: 100%; border: none; padding: 12px 20px; cursor: pointer; }
        .menu-dropdown.show { display: block; }
        .btn { border: 1px solid #b89047; color: #f7f5f0; padding: 12px 28px; background: transparent; cursor: pointer; }
        .content-container { max-width: 950px; margin: 60px auto; padding: 40px; background: #ffffff; border: 1px solid #e2ded5; text-align: left; }
        .tree-vertical { display: flex; flex-direction: column; align-items: center; width: 100%; overflow-x: auto; }
        .gen-section { display: flex; flex-direction: column; align-items: center; width: 100%; margin: 10px 0; }
        .gen-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; }
        .parent-block { display: flex; flex-direction: column; align-items: center; }
        .parent-arrow { width: 2px; height: 30px; background-color: #b89047; position: relative; margin: 5px 0; }
        .parent-arrow::after { content: ""; position: absolute; bottom: -6px; left: -4px; border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 7px solid #b89047; }
        .tree-node { background-color: #ffffff; border: 1px solid #edeae0; padding: 10px 16px; cursor: pointer; min-width: 150px; }
        .tree-node.active { background-color: #1e252b; color: #f7f5f0; }
        .couple-wrapper { display: inline-flex; gap: 8px; padding: 10px; background-color: #faf7f2; border: 2px solid #b89047; }
        .child-node { border: 1px solid #2c5282; color: #2c5282; background-color: #f0f4f8; }
        #add-panel, #info-panel { margin: 20px 0; padding: 20px; background: #faf9f6; border: 1px solid #b89047; display: none; }
        .edit-area { width: 100%; min-height: 60px; border: 1px solid #ccc; padding: 10px; }
    </style>
</head>
<body>

<header>
    <div class="menu-container">
        <button class="menu-btn" onclick="toggleMenu(event)">⋮</button>
        <div class="menu-dropdown" id="menu-dropdown">
            <button onclick="menuAction(1)">Родословное древо</button>
            <button onclick="menuAction(2)">Цифровой архив</button>
        </div>
    </div>
    <h1 id="site-title">Родословная рода Напримеровых</h1>
    <button class="btn" id="lang-toggle" onclick="toggleLanguage()">English</button>
</header>

<main class="content-container">
    <div class="tree-vertical">
        <!-- IV Поколение: Родители -->
        <div class="gen-section">
            <span class="gen-label">IV Поколение</span>
            <div class="gen-row">
                <div class="parent-block">
                    <div class="couple-wrapper">
                        <button class="tree-node" id="node-filipp" onclick="showInfo('filipp', this)" data-name-ru="Филипп Потапович" data-name-en="Filipp Potapovich" data-desc-ru="Глава семьи" data-desc-en="Head of family">Филипп Потапович</button>
                        <button class="tree-node" id="node-elena" onclick="showInfo('elena', this)" data-name-ru="Elena Alekseevna (Wife)" data-name-en="Elena Alekseevna (Wife)" data-desc-ru="Супруга" data-desc-en="Spouse">Elena Alekseevna</button>
                    </div>
                    <div class="parent-arrow"></div>
                </div>
            </div>
        </div>

        <!-- V Поколение: Дети -->
        <div class="gen-section">
            <span class="gen-label">V Поколение</span>
            <div class="gen-row">
                <div class="couple-wrapper">
                    <button class="tree-node child-node" id="node-petr" onclick="showInfo('petr', this)" data-name-ru="Пётр Филиппович" data-name-en="Petr Filippovich" data-desc-ru="Военный офицер" data-desc-en="Officer">Пётр Филиппович</button>
                    <button class="tree-node" id="node-anna-i" onclick="showInfo('anna-i', this)" data-name-ru="Анна Ивановна" data-name-en="Anna Ivanovna" data-desc-ru="Супруга" data-desc-en="Spouse">Анна Ивановна</button>
                </div>
                <button class="tree-node child-node" id="node-vasily" onclick="showInfo('vasily', this)" data-name-ru="Василий Филиппович" data-name-en="Vasily Filippovich" data-desc-ru="Пропал без вести" data-desc-en="Missing">Василий Филиппович</button>
                <button class="tree-node child-node" id="node-evdokiya" onclick="showInfo('evdokiya', this)" data-name-ru="Евдокия Филипповна" data-name-en="Evdokiya Filippovna" data-desc-ru="..." data-desc-en="...">Евдокия Филипповна</button>
                <button class="tree-node child-node" id="node-matrona" onclick="showInfo('matrona', this)" data-name-ru="Матрона Филипповна" data-name-en="Matrona Filippovna" data-desc-ru="..." data-desc-en="...">Матрона Филипповна</button>
                <button class="tree-node child-node" id="node-afanasiy" onclick="showInfo('afanasiy', this)" data-name-ru="Афанасий Филиппович" data-name-en="Afanasiy Filippovich" data-desc-ru="..." data-desc-en="...">Афанасий Филиппович</button>
                <button class="tree-node child-node" id="node-mikhail_f" onclick="showInfo('mikhail_f', this)" data-name-ru="Михаил Филиппович" data-name-en="Mikhail Filippovich" data-desc-ru="..." data-desc-en="...">Михаил Филиппович</button>
            </div>
        </div>
    </div>

    <button onclick="toggleAddPanel()">+ Добавить родственника</button>

    <div id="add-panel">
        <input type="text" id="form-name-ru" placeholder="Имя (RU)">
        <input type="text" id="form-name-en" placeholder="Name (EN)">
        <button class="btn-save" onclick="addNewRelative()">Сохранить</button>
    </div>

    <div id="info-panel">
        <h4 id="info-name"></h4>
        <div id="info-text" class="edit-area" contenteditable="true"></div>
        <button class="btn-save" onclick="saveInfo()">Сохранить изменения и скачать файл</button>
    </div>
</main>

<script>
    let currentLang = 'ru';
    let currentMemberId = null;

    // Переключение языка
    function toggleLanguage() {
        currentLang = currentLang === 'ru' ? 'en' : 'ru';
        document.querySelectorAll('.tree-node').forEach(el => {
            el.innerText = currentLang === 'ru' ? el.getAttribute('data-name-ru') : el.getAttribute('data-name-en');
        });
        document.getElementById('lang-toggle').innerText = currentLang === 'ru' ? 'English' : 'Русский';
    }

    // Меню
    function toggleMenu(e) { e.stopPropagation(); document.getElementById('menu-dropdown').classList.toggle('show'); }
    function menuAction(id) { alert("Действие " + id); }

    // Информация
    function showInfo(id, element) {
        currentMemberId = id;
        document.querySelectorAll('.tree-node').forEach(n => n.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('info-name').innerText = currentLang === 'ru' ? element.getAttribute('data-name-ru') : element.getAttribute('data-name-en');
        document.getElementById('info-text').innerText = currentLang === 'ru' ? element.getAttribute('data-desc-ru') : element.getAttribute('data-desc-en');
        document.getElementById('info-panel').style.display = 'block';
    }

    // Добавление
    function toggleAddPanel() { document.getElementById('add-panel').style.display = document.getElementById('add-panel').style.display === 'block' ? 'none' : 'block'; }
    function addNewRelative() {
        const nameRu = document.getElementById('form-name-ru').value;
        const newBtn = document.createElement("button");
        newBtn.className = "tree-node child-node";
        newBtn.id = "node-" + Date.now();
        newBtn.innerText = nameRu;
        newBtn.setAttribute("data-name-ru", nameRu);
        newBtn.onclick = function() { showInfo(this.id, this); };
        document.querySelector('.gen-row').appendChild(newBtn);
        alert("Добавлено!");
    }

    // Сохранение и скачивание
    function saveInfo() {
        const code = prompt("Введите код:");
        if (code === "270980") {
            const node = document.getElementById(currentMemberId);
            node.setAttribute('data-desc-ru', document.getElementById('info-text').innerText);
            
            const htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: "text/html" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "index.html";
            link.click();
        } else {
            alert("Неверный код");
        }
    }
</script>

</body>
</html>
