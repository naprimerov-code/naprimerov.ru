<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Родословная рода Напримеровых / Genealogy of the Naprimerov Lineage</title>
    <style>
        /* Стиль Классической Летописи (Глубокий графит, благородное золото и теплая слоновая кость) */
        body {
            font-family: "Georgia", "Times New Roman", serif; /* Исторический, книжный шрифт */
            background-color: #f7f5f0; /* Цвет старинной плотной бумаги */
            color: #2b2d2f;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #1e252b; /* Глубокий строгий темный тон */
            color: #f7f5f0;
            padding: 50px 20px;
            border-bottom: 3px solid #b89047; /* Благородное матовое золото */
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        header h1 {
            margin: 0 0 10px 0;
            font-size: 2.4rem;
            font-weight: normal;
            letter-spacing: 1px;
        }
        header p {
            margin: 0 0 25px 0;
            font-style: italic;
            color: #b89047;
            font-size: 1.1rem;
        }
        .btn {
            font-family: Arial, sans-serif;
            background-color: transparent;
            color: #f7f5f0;
            border: 1px solid #b89047;
            padding: 10px 24px;
            margin: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 2px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #b89047;
            color: #1e252b;
        }
        .btn-contact {
            background-color: #b89047;
            color: #1e252b;
        }
        .btn-contact:hover {
            background-color: transparent;
            color: #b89047;
        }
        .tree-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 900px;
            margin: 50px auto;
            padding: 0 20px;
        }
        .tree-level {
            background: #ffffff;
            border: 1px solid #e2ded5;
            border-radius: 2px;
            padding: 25px;
            box-shadow: 0 5px 12px rgba(43, 45, 47, 0.03);
            position: relative;
        }
        .tree-level::before {
            content: "";
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid #edeae0;
            pointer-events: none;
        }
        .level-title {
            font-weight: normal;
            color: #1e252b;
            margin-bottom: 25px;
            border-bottom: 1px solid #b89047;
            padding-bottom: 10px;
            font-size: 18px;
            letter-spacing: 1px;
            text-align: left;
        }
        .nodes-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 20px;
        }
        .tree-node {
            background-color: #faf9f6;
            border: 1px solid #dcd7cc;
            border-top: 3px solid #b89047; /* Золотой акцент сверху каждой карточки */
            border-radius: 2px;
            padding: 15px 20px;
            min-width: 240px;
            text-align: left;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .tree-node h4 {
            margin: 0 0 8px 0;
            color: #1e252b;
            font-size: 17px;
            font-weight: normal;
            line-height: 1.4;
        }
        .tree-node p {
            margin: 0;
            color: #7a7365;
            font-family: Arial, sans-serif;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<header>
    <h1 id="site-title">Родословная рода Напримеровых</h1>
    <p id="site-subtitle">Летопись поколений, история и семейная память</p>
    <button class="btn" id="lang-toggle" onclick="toggleLanguage()">English</button>
    <a class="btn btn-contact" id="contact-btn" href="mailto:naprimerov@mail.ru?subject=Заявка в генеалогическое древо рода Напримеров&body=ФИО / Full Name:%0AГоды жизни / Years of life:%0AРодственная связь / Relationship:">Внести имя в летопись рода</a>
</header>

<main class="tree-container">
    <!-- Старшее поколение -->
    <div class="tree-level">
        <div class="level-title" id="title-gparents">Род Напримеровых: Дедушки и Бабушки</div>
        <div class="nodes-group" id="level-grandparents"></div>
    </div>

    <!-- Родители -->
    <div class="tree-level">
        <div class="level-title" id="title-parents">Род Напримеровых: Родительское поколение</div>
        <div class="nodes-group" id="level-parents"></div>
    </div>

    <!-- Текущее поколение -->
    <div class="tree-level">
        <div class="level-title" id="title-current">Род Напримеровых: Современники (Текущее поколение)</div>
        <div class="nodes-group" id="level-current"></div>
    </div>
</main>

<script>
    // ==========================================
    // БАЗА ДАННЫХ ДРЕВА
    // ==========================================
    const familyData = [
        {
            nameRu: "Напримеров Дмитрий Викторович",
            nameEn: "Naprimerov Dmitriy Viktorovich",
            years: "27.09.1980", 
            level: "current"
        },
        {
            nameRu: "Напримеров Пётр Филиппович",
            nameEn: "Naprimerov Petr Filippovich",
            years: "1915 - 1992", 
            level: "grandparents"
        },
        {
            nameRu: "Напримеров Виктор Петрович",
            nameEn: "Naprimerov Viktor Petrovich",
            years: "1947 - н.в.",
            level: "parents"
        }
    ];

    // Переводы текстов с упоминанием рода
    const translations = {
        ru: {
            title: "Родословная рода Напримеровых",
            subtitle: "Летопись поколений, история и семейная память",
            gparents: "Род Напримеровых: Дедушки и Бабушки",
            parents: "Род Напримеровых: Родительское поколение",
            current: "Род Напримеровых: Современники (Текущее поколение)",
            contact: "Внести имя в летопись рода",
            toggle: "English"
        },
        en: {
            title: "Genealogy of the Naprimerov Lineage",
            subtitle: "Chronicle of generations, family history and memory",
            gparents: "Naprimerov Lineage: Grandparents",
            parents: "Naprimerov Lineage: Parents' Generation",
            current: "Naprimerov Lineage: Contemporaries (Current Generation)",
            contact: "Submit a name to the chronicle",
            toggle: "Русский"
        }
    };

    let currentLang = 'ru';

    function renderTree() {
        document.getElementById('level-grandparents').innerHTML = '';
        document.getElementById('level-parents').innerHTML = '';
        document.getElementById('level-current').innerHTML = '';

        document.getElementById('site-title').innerText = translations[currentLang].title;
        document.getElementById('site-subtitle').innerText = translations[currentLang].subtitle;
        document.getElementById('title-gparents').innerText = translations[currentLang].gparents;
        document.getElementById('title-parents').innerText = translations[currentLang].parents;
        document.getElementById('title-current').innerText = translations[currentLang].current;
        document.getElementById('contact-btn').innerText = translations[currentLang].contact;
        document.getElementById('lang-toggle').innerText = translations[currentLang].toggle;

        familyData.forEach(person => {
            const container = document.getElementById(`level-${person.level}`);
            if (container) {
                const name = currentLang === 'ru' ? person.nameRu : person.nameEn;
                const node = document.createElement('div');
                node.className = 'tree-node';
                node.innerHTML = `<h4>${name}</h4><p>${person.years}</p>`;
                container.appendChild(node);
            }
        });
    }

    function toggleLanguage() {
        currentLang = currentLang === 'ru' ? 'en' : 'ru';
        renderTree();
    }

    renderTree();
</script>

</body>
</html>
