<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Родословная рода Напримеровых</title>
    <style>
        body { font-family: "Georgia", serif; background-color: #f7f5f0; color: #2b2d2f; margin: 0; padding: 20px; text-align: center; }
        header { padding: 40px 0; border-bottom: 2px solid #b89047; margin-bottom: 40px; }
        h1 { margin: 0; font-weight: normal; }
        .tree-container { display: flex; flex-direction: column; align-items: center; gap: 40px; }
        .gen-level { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .gen-label { font-size: 0.8rem; color: #b89047; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 2px; }
        .gen-row { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .node { background: #fff; border: 1px solid #b89047; padding: 15px; min-width: 150px; text-align: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }
        .arrow { height: 30px; width: 1px; background: #b89047; margin: 10px auto; }
    </style>
</head>
<body>

<header>
    <h1>Родословная рода Напримеровых</h1>
    <p><em>Историко-генеалогический архив семьи</em></p>
</header>

<main class="tree-container">
    <!-- I Поколение -->
    <div class="gen-level">
        <div class="gen-label">I Поколение</div>
        <div class="gen-row"><div class="node">Наум</div></div>
        <div class="arrow"></div>
    </div>

    <!-- II Поколение -->
    <div class="gen-level">
        <div class="gen-label">II Поколение</div>
        <div class="gen-row"><div class="node">Михаил Наумович</div></div>
        <div class="arrow"></div>
    </div>

    <!-- III Поколение -->
    <div class="gen-level">
        <div class="gen-label">III Поколение</div>
        <div class="gen-row"><div class="node">Потап Михайлович</div></div>
        <div class="arrow"></div>
    </div>

    <!-- IV Поколение -->
    <div class="gen-level">
        <div class="gen-label">IV Поколение</div>
        <div class="gen-row"><div class="node">Филипп Потапович</div></div>
    </div>
</main>

</body>
</html>
